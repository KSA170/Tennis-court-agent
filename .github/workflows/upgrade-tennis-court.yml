name: Upgrade tennis bookings

# Daytime "upgrade sweep": checks existing weekday bookings and moves any that sit
# at a lower-preference time (e.g. 10 PM / 8 PM) up to a better slot (9 PM / 8 PM)
# if one has freed up. Books the better slot FIRST, then cancels the old one, so a
# reservation is never lost. Runs a handful of times through the day.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (trace the sweep without booking/cancelling)'
        type: boolean
        default: true
  schedule:
    # UTC; spread through Toronto daytime/evening (EDT shown). Modest cadence to
    # avoid churn — a few checks a day is plenty to catch a freed-up slot.
    - cron: '0 14 * * *'    # 10:00 EDT
    - cron: '0 17 * * *'    # 13:00 EDT
    - cron: '0 20 * * *'    # 16:00 EDT
    - cron: '0 23 * * *'    # 19:00 EDT
    - cron: '0 1 * * *'     # 21:00 EDT (prev day)

concurrency:
  # Share the booking group so an upgrade sweep never runs concurrently with the
  # 7 AM booking (they both touch reservations).
  group: book-tennis-court
  cancel-in-progress: false

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Locate app directory
        run: |
          ENTRY=$(find . -name index.js -not -path '*/node_modules/*' -not -path '*/.git/*' | head -1)
          if [ -z "$ENTRY" ]; then echo "::error::index.js not found anywhere in the repo"; exit 1; fi
          APPDIR=$(dirname "$ENTRY")
          echo "APPDIR=$APPDIR" >> "$GITHUB_ENV"
          echo "ENTRYFILE=$(basename "$ENTRY")" >> "$GITHUB_ENV"
          if [ ! -f "$APPDIR/package.json" ]; then
            echo '{"name":"tennis-court-agent","private":true,"type":"module"}' > "$APPDIR/package.json"
          fi

      - name: Install dependencies
        run: cd "$APPDIR" && npm install --no-save playwright@^1.48.0

      - name: Install Chromium
        run: cd "$APPDIR" && npx playwright install --with-deps chromium

      - name: Run upgrade sweep
        env:
          CR_MODE: upgrade
          CR_PORTAL_URL: ${{ secrets.CR_PORTAL_URL }}
          CR_USERNAME: ${{ secrets.CR_USERNAME }}
          CR_PASSWORD: ${{ secrets.CR_PASSWORD }}
          CR_MEMBERS_JSON: ${{ secrets.CR_MEMBERS_JSON }}
          CR_TARGET_HOURS: ${{ vars.CR_TARGET_HOURS }}
          CR_WEEKDAYS_ONLY: ${{ vars.CR_WEEKDAYS_ONLY }}
          CR_RESERVATION_TYPE: ${{ vars.CR_RESERVATION_TYPE }}
          CR_COURT_PREFERENCE: ${{ vars.CR_COURT_PREFERENCE }}
          CR_OPPONENTS: ${{ vars.CR_OPPONENTS }}
          CR_MAX_RESERVATIONS: ${{ vars.CR_MAX_RESERVATIONS }}
          CR_NOTIFY_EMAIL: ${{ vars.CR_NOTIFY_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          CR_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          # Manual runs and scheduled runs both execute immediately (no 7 AM arming).
          CR_FORCE_NOW: '1'
        run: cd "$APPDIR" && node "$ENTRYFILE"
