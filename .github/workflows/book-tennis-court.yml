name: Book tennis court

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do everything except final submit/cancel)'
        type: boolean
        default: true
      discover:
        description: 'Discovery: log in, dump live JSON shapes, and exit'
        type: boolean
        default: false
      target_date:
        description: 'One-off date override, YYYY-MM-DD (default: today + 6 days)'
        type: string
        default: ''
      target_hour:
        description: 'One-off hour override, e.g. "8:00 PM" (default: 9:00 PM)'
        type: string
        default: ''
  schedule:
    - cron: '35 10 * * *'
    - cron: '42 10 * * *'
    - cron: '48 10 * * *'
    - cron: '53 10 * * *'
    - cron: '35 11 * * *'
    - cron: '42 11 * * *'
    - cron: '48 11 * * *'
    - cron: '53 11 * * *'

concurrency:
  group: book-tennis-court
  cancel-in-progress: false

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Locate app directory
        run: |
          echo "=== repo tree ==="
          find . -not -path '*/node_modules/*' -not -path '*/.git/*' -maxdepth 4 | sort
          echo "================="
          ENTRY=$(find . -name index.js -not -path '*/node_modules/*' -not -path '*/.git/*' | head -1)
          if [ -z "$ENTRY" ]; then echo "::error::index.js not found anywhere in the repo"; exit 1; fi
          APPDIR=$(dirname "$ENTRY")
          echo "APPDIR=$APPDIR" >> "$GITHUB_ENV"
          echo "ENTRYFILE=$(basename "$ENTRY")" >> "$GITHUB_ENV"
          echo "Using APPDIR=$APPDIR entry=$(basename "$ENTRY")"
          if [ ! -f "$APPDIR/package.json" ]; then
            echo '{"name":"tennis-court-agent","private":true,"type":"module"}' > "$APPDIR/package.json"
            echo "No package.json beside the entry — wrote a minimal ESM one."
          fi

      - name: Install dependencies
        run: cd "$APPDIR" && npm install --no-save playwright@^1.48.0

      - name: Install Chromium
        run: cd "$APPDIR" && npx playwright install --with-deps chromium

      - name: Run booking agent
        env:
          CR_PORTAL_URL: ${{ secrets.CR_PORTAL_URL }}
          CR_USERNAME: ${{ secrets.CR_USERNAME }}
          CR_PASSWORD: ${{ secrets.CR_PASSWORD }}
          CR_MEMBERS_JSON: ${{ secrets.CR_MEMBERS_JSON }}
          CR_TARGET_HOUR: ${{ inputs.target_hour || vars.CR_TARGET_HOUR }}
          CR_TARGET_DATE: ${{ inputs.target_date }}
          CR_DURATION_MIN: ${{ vars.CR_DURATION_MIN }}
          CR_RESERVATION_TYPE: ${{ vars.CR_RESERVATION_TYPE }}
          CR_COURT_PREFERENCE: ${{ vars.CR_COURT_PREFERENCE }}
          CR_OPPONENTS: ${{ vars.CR_OPPONENTS }}
          CR_MAX_RESERVATIONS: ${{ vars.CR_MAX_RESERVATIONS }}
          CR_CANCEL_HOUR: ${{ vars.CR_CANCEL_HOUR }}
          CR_NOTIFY_EMAIL: ${{ vars.CR_NOTIFY_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          CR_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          CR_DISCOVER: ${{ inputs.discover && '1' || '' }}
          # Manual runs fire immediately; only the 7 AM schedule does timed arming.
          CR_FORCE_NOW: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: cd "$APPDIR" && node "$ENTRYFILE"

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: ${{ env.APPDIR }}/debug/
          if-no-files-found: ignore
          retention-days: 7
