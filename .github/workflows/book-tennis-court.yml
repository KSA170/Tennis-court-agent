name: Book tennis court

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do everything except final submit/cancel)'
        type: boolean
        default: true
      discover:
        description: 'Discovery: log in, dump live JSON shapes, and exit'
        type: boolean
        default: false
      target_date:
        description: 'One-off date override, YYYY-MM-DD (default: today + 6 days)'
        type: string
        default: ''
      target_hour:
        description: 'One-off hour override, e.g. "8:00 PM" (default: 9:00 PM)'
        type: string
        default: ''
  # PREFERRED on-time trigger: an external scheduler (e.g. cron-job.org) POSTs a
  # repository_dispatch ~6:50 AM America/Toronto. Unlike GitHub's own cron (which is
  # routinely delayed 30 min – several HOURS — see the schedule note below), a
  # repository_dispatch is delivered within seconds, so index.js can arm and sleep to
  # exactly 7:00:00. event_name != 'workflow_dispatch', so CR_FORCE_NOW stays unset and
  # the normal timed-arming path runs.
  repository_dispatch:
    types: [book-now]
  # BACKUP only. Booking opens 7:00 AM America/Toronto. Crons are UTC and DST-blind, so we cover
  # BOTH seasons: open is 11:00 UTC (EDT, Mar–Nov) and 12:00 UTC (EST, Nov–Mar).
  # index.js exits if a runner boots too early, arms+sleeps if it boots in the
  # arming window, and STILL attempts the booking if it boots late (GitHub cron is
  # routinely delayed 30+ min). So we stagger arming crons before each seasonal open
  # plus a chain of late-attempt fallbacks after it; idempotency makes extra firings
  # harmless (a later run sees "already-booked" and exits).
  schedule:
    - cron: '35 10 * * *'   # 06:35 EDT / 05:35 EST
    - cron: '50 10 * * *'   # 06:50 EDT / 05:50 EST  (EDT arming window)
    - cron: '5 11 * * *'    # 07:05 EDT / 06:05 EST  (EDT late attempt)
    - cron: '20 11 * * *'   # 07:20 EDT / 06:20 EST
    - cron: '40 11 * * *'   # 07:40 EDT / 06:40 EST
    - cron: '55 11 * * *'   # 07:55 EDT / 06:55 EST  (EST arming window)
    - cron: '10 12 * * *'   # 08:10 EDT / 07:10 EST  (EST late attempt)
    - cron: '30 12 * * *'   # 08:30 EDT / 07:30 EST
    - cron: '15 13 * * *'   # 09:15 EDT / 08:15 EST  (late fallback)
    - cron: '0 14 * * *'    # 10:00 EDT / 09:00 EST  (late fallback)

concurrency:
  group: book-tennis-court
  cancel-in-progress: false

jobs:
  book:
    runs-on: ubuntu-latest
    # Generous: a runner that boots in the arming window idles up to ~40 min before
    # firing, plus install + booking time.
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Locate app directory
        run: |
          echo "=== repo tree ==="
          find . -not -path '*/node_modules/*' -not -path '*/.git/*' -maxdepth 4 | sort
          echo "================="
          ENTRY=$(find . -name index.js -not -path '*/node_modules/*' -not -path '*/.git/*' | head -1)
          if [ -z "$ENTRY" ]; then echo "::error::index.js not found anywhere in the repo"; exit 1; fi
          APPDIR=$(dirname "$ENTRY")
          echo "APPDIR=$APPDIR" >> "$GITHUB_ENV"
          echo "ENTRYFILE=$(basename "$ENTRY")" >> "$GITHUB_ENV"
          echo "Using APPDIR=$APPDIR entry=$(basename "$ENTRY")"
          if [ ! -f "$APPDIR/package.json" ]; then
            echo '{"name":"tennis-court-agent","private":true,"type":"module"}' > "$APPDIR/package.json"
            echo "No package.json beside the entry — wrote a minimal ESM one."
          fi

      - name: Install dependencies
        run: cd "$APPDIR" && npm install --no-save playwright@^1.48.0

      - name: Install Chromium
        run: cd "$APPDIR" && npx playwright install --with-deps chromium

      - name: Run booking agent
        env:
          CR_PORTAL_URL: ${{ secrets.CR_PORTAL_URL }}
          CR_USERNAME: ${{ secrets.CR_USERNAME }}
          CR_PASSWORD: ${{ secrets.CR_PASSWORD }}
          CR_MEMBERS_JSON: ${{ secrets.CR_MEMBERS_JSON }}
          CR_TARGET_HOUR: ${{ inputs.target_hour || vars.CR_TARGET_HOUR }}
          CR_TARGET_DATE: ${{ inputs.target_date }}
          CR_DURATION_MIN: ${{ vars.CR_DURATION_MIN }}
          CR_RESERVATION_TYPE: ${{ vars.CR_RESERVATION_TYPE }}
          CR_COURT_PREFERENCE: ${{ vars.CR_COURT_PREFERENCE }}
          CR_OPPONENTS: ${{ vars.CR_OPPONENTS }}
          CR_MAX_RESERVATIONS: ${{ vars.CR_MAX_RESERVATIONS }}
          CR_CANCEL_HOUR: ${{ vars.CR_CANCEL_HOUR }}
          CR_NOTIFY_EMAIL: ${{ vars.CR_NOTIFY_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          CR_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          CR_DISCOVER: ${{ inputs.discover && '1' || '' }}
          # Manual runs fire immediately; only the 7 AM schedule does timed arming.
          CR_FORCE_NOW: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: cd "$APPDIR" && node "$ENTRYFILE"

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: ${{ env.APPDIR }}/debug/
          if-no-files-found: ignore
          retention-days: 7
